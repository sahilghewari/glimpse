<svg
    viewBox="0 0 120 120"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
>
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <filter id="inner-shadow">
            <feOffset dx="0" dy="2"/>
            <feGaussianBlur stdDeviation="3" result="offset-blur"/>
            <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
            <feFlood floodColor="black" floodOpacity="0.4" result="color"/>
            <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
            <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
        </filter>

        <linearGradient id="apertureGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#A5B4FC" />
            <stop offset="50%" stopColor="#6366F1" />
            <stop offset="100%" stopColor="#3730A3" />
        </linearGradient>
        <linearGradient id="apertureGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="#818CF8" />
            <stop offset="60%" stopColor="#4F46E5" />
            <stop offset="100%" stopColor="#312E81" />
        </linearGradient>
        
        <radialGradient id="centerJewel" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#E0E7FF" />
            <stop offset="60%" stopColor="#818CF8" />
            <stop offset="100%" stopColor="#4338CA" />
        </radialGradient>
    </defs>

    <circle cx="60" cy="60" r="55" fill="#4F46E5" opacity="0.15" filter="url(#glow)" />

    <g style="mix-blend-mode: screen" transform="translate(60, 60)">
        <ellipse cx="0" cy="0" rx="55" ry="24" transform="rotate(0)" fill="url(#apertureGrad1)" opacity="0.5" filter="url(#glow)" />
        <ellipse cx="0" cy="0" rx="55" ry="24" transform="rotate(45)" fill="url(#apertureGrad2)" opacity="0.5" filter="url(#glow)" />
        <ellipse cx="0" cy="0" rx="55" ry="24" transform="rotate(90)" fill="url(#apertureGrad1)" opacity="0.5" filter="url(#glow)" />
        <ellipse cx="0" cy="0" rx="55" ry="24" transform="rotate(135)" fill="url(#apertureGrad2)" opacity="0.5" filter="url(#glow)" />

        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(22.5)" fill="url(#apertureGrad2)" opacity="0.95" filter="url(#inner-shadow)" />
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(67.5)" fill="url(#apertureGrad1)" opacity="0.95" filter="url(#inner-shadow)" />
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(112.5)" fill="url(#apertureGrad2)" opacity="0.95" filter="url(#inner-shadow)" />
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(157.5)" fill="url(#apertureGrad1)" opacity="0.95" filter="url(#inner-shadow)" />
        
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(22.5)" stroke="#C7D2FE" stroke-width="0.8" opacity="0.7" />
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(67.5)" stroke="#C7D2FE" stroke-width="0.8" opacity="0.7" />
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(112.5)" stroke="#C7D2FE" stroke-width="0.8" opacity="0.7" />
        <ellipse cx="0" cy="0" rx="46" ry="17" transform="rotate(157.5)" stroke="#C7D2FE" stroke-width="0.8" opacity="0.7" />
    </g>

    <g transform="translate(60, 60)">
        <circle cx="0" cy="0" r="12" fill="#312E81" opacity="0.7" filter="url(#glow)" />
        <circle cx="0" cy="0" r="8" fill="url(#centerJewel)" filter="url(#inner-shadow)" />
        <circle cx="0" cy="-1.5" r="3.5" fill="#FFFFFF" opacity="0.8" filter="url(#glow)" />
    </g>
</svg>
